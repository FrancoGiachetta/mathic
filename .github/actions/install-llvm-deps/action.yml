name: 'Install LLVM Dependencies'
description: 'Install LLVM and related dependencies'
runs:
  using: "composite"
  steps:
    - name: Add LLVM Debian repository
      uses: myci-actions/add-deb-repo@11
      with:
        repo: deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main
        repo-name: llvm-repo
        keys-asc: https://apt.llvm.org/llvm-snapshot.gpg.key
    - name: Update and upgrade APT
      shell: bash
      run: sudo apt-get update && sudo apt-get upgrade -y
    - name: Install LLVM
      shell: bash
      run: sudo apt-get install llvm-21 llvm-21-dev llvm-21-runtime clang-21 clang-tools-21 lld-21 libpolly-21-dev libmlir-21-dev mlir-21-tools
    - name: Add SymEngine repository
      uses: actions/checkout@v6
      with:
        repository: symengine/symengine
        path: symengine
        ref: v0.14.0
    - name: Install SymEngine
      shell: bash
      run: |
        cd symengine
        mkdir build && cd build
        cmake ..
        make
        make install
